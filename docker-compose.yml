version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    networks:
      - vacation-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - vacation-network

networks:
  vacation-network:
    driver: bridge
